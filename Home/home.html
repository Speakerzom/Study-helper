<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Helper</title>
  <link rel="icon" type="image/png" href="Web_icon.png">
  <style>
    /* ============================================================
       home.css – Study Helper
       Hệ màu: cam #FF6B00, trắng #FFF, đen #0D0D0D,
               lime #7FFF00, vàng #FFD700, cyan #00CED1, teal #00897B
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange : #FF6B00;
      --lime   : #7FFF00;
      --yellow : #FFD700;
      --cyan   : #00CED1;
      --teal   : #00897B;
      --white  : #FFFFFF;
      --black  : #0D0D0D;
      --bg     : #FFFFFF;
      --bg2    : #F5F5F5;
      --surface: #FFFFFF;
      --text   : #0D0D0D;
      --text2  : #444444;
      --border : #E0E0E0;
      --sidebar-w: 260px;
      --header-h : 64px;
      --radius : 12px;
      --shadow : 0 4px 24px rgba(0,0,0,.10);
      --trans  : .3s cubic-bezier(.4,0,.2,1);
    }
    body.dark {
      --bg     : #0D0D0D; --bg2    : #141414;
      --surface: #1A1A1A; --text   : #FFFFFF;
      --text2  : #AAAAAA; --border : #2A2A2A;
      --shadow : 0 4px 24px rgba(0,0,0,.5);
    }
    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      transition: background var(--trans), color var(--trans);
    }

    /* ══ NỀN: LƯỚI + ĐỐM SÁNG ══ */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0,0,0,.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,.055) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    body.dark::before {
      background-image:
        linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* 4 đốm sáng — đi tự do toàn màn hình, không bị neo góc */
    .sh-orb {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 1;
      will-change: transform, opacity;
    }

    /* Cam → lan sang giữa */
    #orb-a {
      width: 660px; height: 660px;
      top: -180px; left: -180px;
      background: radial-gradient(circle, rgba(255,107,0,.24) 0%, rgba(255,107,0,.07) 42%, transparent 68%);
      filter: blur(68px);
      animation: orb-a 12s cubic-bezier(.45,.05,.55,.95) infinite alternate;
    }
    body.dark #orb-a { background: radial-gradient(circle, rgba(220,80,0,.46) 0%, rgba(180,50,0,.15) 42%, transparent 68%); }

    /* Teal → đi lên trên */
    #orb-b {
      width: 620px; height: 620px;
      bottom: -180px; right: -180px;
      background: radial-gradient(circle, rgba(0,137,123,.22) 0%, rgba(0,206,209,.07) 42%, transparent 68%);
      filter: blur(68px);
      animation: orb-b 13s cubic-bezier(.45,.05,.55,.95) infinite alternate;
      animation-delay: -4s;
    }
    body.dark #orb-b { background: radial-gradient(circle, rgba(0,115,85,.46) 0%, rgba(0,190,210,.15) 42%, transparent 68%); }

    /* Cyan → đi chéo */
    #orb-c {
      width: 460px; height: 460px;
      top: -110px; right: -110px;
      background: radial-gradient(circle, rgba(0,206,209,.20) 0%, rgba(0,137,123,.06) 42%, transparent 68%);
      filter: blur(62px);
      animation: orb-c 14s cubic-bezier(.45,.05,.55,.95) infinite alternate;
      animation-delay: -6s;
    }
    body.dark #orb-c { background: radial-gradient(circle, rgba(0,190,210,.38) 0%, rgba(0,160,180,.12) 42%, transparent 68%); }

    /* Cam/teal mix → đi lên phải */
    #orb-d {
      width: 400px; height: 400px;
      bottom: -110px; left: -110px;
      background: radial-gradient(circle, rgba(255,107,0,.16) 0%, rgba(0,206,209,.08) 52%, transparent 68%);
      filter: blur(62px);
      animation: orb-d 15s cubic-bezier(.45,.05,.55,.95) infinite alternate;
      animation-delay: -2s;
    }
    body.dark #orb-d { background: radial-gradient(circle, rgba(200,60,0,.34) 0%, rgba(0,190,210,.14) 52%, transparent 68%); }

    /* Quỹ đạo tự do qua toàn màn hình — mỗi orb 1 hướng khác nhau */
    @keyframes orb-a {
      0%   { transform: translate(   0px,    0px) scale(1.00); opacity:.58; }
      15%  { transform: translate( 280px,  160px) scale(1.06); opacity:.76; }
      35%  { transform: translate( 520px,   80px) scale(0.96); opacity:.62; }
      50%  { transform: translate( 700px,  320px) scale(1.08); opacity:.80; }
      68%  { transform: translate( 480px,  500px) scale(0.97); opacity:.60; }
      82%  { transform: translate( 820px,  280px) scale(1.04); opacity:.72; }
      100% { transform: translate( 600px,  440px) scale(1.01); opacity:.66; }
    }
    @keyframes orb-b {
      0%   { transform: translate(    0px,    0px) scale(1.00); opacity:.58; }
      18%  { transform: translate( -260px, -180px) scale(1.07); opacity:.74; }
      38%  { transform: translate( -540px,  -70px) scale(0.95); opacity:.60; }
      55%  { transform: translate( -720px, -340px) scale(1.06); opacity:.78; }
      72%  { transform: translate( -460px, -520px) scale(0.96); opacity:.58; }
      88%  { transform: translate( -800px, -260px) scale(1.03); opacity:.70; }
      100% { transform: translate( -580px, -460px) scale(1.02); opacity:.64; }
    }
    @keyframes orb-c {
      0%   { transform: translate(    0px,   0px) scale(1.00); opacity:.50; }
      20%  { transform: translate( -220px,  200px) scale(1.08); opacity:.68; }
      42%  { transform: translate( -580px,  140px) scale(0.94); opacity:.52; }
      60%  { transform: translate( -380px,  440px) scale(1.07); opacity:.70; }
      78%  { transform: translate( -700px,  300px) scale(0.96); opacity:.50; }
      100% { transform: translate( -480px,  500px) scale(1.03); opacity:.62; }
    }
    @keyframes orb-d {
      0%   { transform: translate(   0px,    0px) scale(1.00); opacity:.50; }
      22%  { transform: translate(  240px, -200px) scale(1.09); opacity:.66; }
      45%  { transform: translate(  560px, -130px) scale(0.93); opacity:.52; }
      62%  { transform: translate(  360px, -440px) scale(1.06); opacity:.68; }
      80%  { transform: translate(  680px, -300px) scale(0.95); opacity:.50; }
      100% { transform: translate(  460px, -500px) scale(1.04); opacity:.60; }
    }

    /* HEADER */
    header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 2px solid var(--orange);
      display: flex; align-items: center;
      padding: 0 24px; gap: 18px; z-index: 900;
      box-shadow: var(--shadow);
      transition: background var(--trans);
    }
    #btn-menu {
      background: none; border: 2px solid var(--orange);
      border-radius: 8px; width: 42px; height: 42px;
      cursor: pointer; display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 5px;
      flex-shrink: 0; transition: background var(--trans);
    }
    #btn-menu:hover { background: rgba(255,107,0,.12); }
    #btn-menu span {
      display: block; width: 22px; height: 2.5px;
      background: var(--orange); border-radius: 2px;
      transition: transform var(--trans), opacity var(--trans);
    }
    body.sidebar-open #btn-menu span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    body.sidebar-open #btn-menu span:nth-child(2) { opacity: 0; }
    body.sidebar-open #btn-menu span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

    #logo {
      font-size: 2rem; font-weight: 900; letter-spacing: -1px;
      background: linear-gradient(90deg, var(--cyan) 0%, var(--lime) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; user-select: none;
      line-height: 1.2; padding-bottom: 2px;
    }
    #active-badge {
      margin-left: auto; font-size: .78rem; font-weight: 700;
      letter-spacing: .05em; text-transform: uppercase;
      padding: 4px 12px; border-radius: 20px;
      background: var(--orange); color: #fff;
      transition: background var(--trans);
    }

    /* OVERLAY */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 950;
      opacity: 0; pointer-events: none;
      transition: opacity var(--trans);
    }
    body.sidebar-open #overlay { opacity: 1; pointer-events: all; }

    /* SIDEBAR */
    #sidebar {
      position: fixed; top: 0; left: 0;
      width: var(--sidebar-w); height: 100%;
      background: var(--surface);
      border-right: 2px solid var(--orange);
      z-index: 1000; display: flex; flex-direction: column;
      transform: translateX(calc(-1 * var(--sidebar-w)));
      transition: transform var(--trans), background var(--trans);
      box-shadow: 4px 0 32px rgba(0,0,0,.18);
    }
    body.sidebar-open #sidebar { transform: translateX(0); }

    .sidebar-header {
      height: var(--header-h);
      display: flex; align-items: center;
      padding: 0 20px; border-bottom: 1px solid var(--border);
      font-size: .8rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--cyan);
    }
    nav#sidebar-nav {
      flex: 1; padding: 16px 12px;
      display: flex; flex-direction: column; gap: 6px;
      overflow-y: auto;
    }
    nav#sidebar-nav a {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 16px; border-radius: var(--radius);
      text-decoration: none; color: var(--text);
      font-size: .97rem; font-weight: 600;
      transition: background var(--trans), color var(--trans), transform .15s;
      cursor: pointer; border: 2px solid transparent;
    }
    nav#sidebar-nav a .nav-icon { font-size: 1.3rem; width: 28px; text-align: center; flex-shrink: 0; }
    nav#sidebar-nav a:hover { background: rgba(255,107,0,.1); border-color: var(--orange); color: var(--orange); transform: translateX(4px); }
    nav#sidebar-nav a.active { background: linear-gradient(90deg,rgba(0,206,209,.18),rgba(127,255,0,.12)); border-color: var(--cyan); color: var(--cyan); }
    nav#sidebar-nav a.active .nav-icon { color: var(--lime); }
    .nav-divider { height: 1px; background: var(--border); margin: 8px 4px; }

    .sidebar-footer { padding: 16px 16px 24px; border-top: 1px solid var(--border); }
    #btn-theme {
      width: 100%; display: flex; align-items: center;
      justify-content: space-between; padding: 11px 16px;
      border-radius: var(--radius); border: 2px solid var(--border);
      background: var(--bg2); color: var(--text);
      font-size: .92rem; font-weight: 600; cursor: pointer;
      transition: border-color var(--trans), background var(--trans); gap: 10px;
    }
    #btn-theme:hover { border-color: var(--cyan); }
    .toggle-track {
      width: 44px; height: 24px; border-radius: 12px;
      background: var(--border); position: relative; flex-shrink: 0;
      transition: background var(--trans);
    }
    body.dark .toggle-track { background: var(--cyan); }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; transition: transform var(--trans);
      box-shadow: 0 1px 4px rgba(0,0,0,.3);
    }
    body.dark .toggle-thumb { transform: translateX(20px); }

    /* MAIN — iframe wrapper */
    #main {
      margin-top: var(--header-h);
      height: calc(100vh - var(--header-h));
      background: var(--bg);
      transition: background var(--trans);
      position: relative;
    }

    /* Dùng iframe để load module thật, không inject template */
    #module-frame {
      width: 100%; height: 100%;
      border: none; display: block;
      background: transparent;
    }

    /* Fallback nếu iframe không load */
    #frame-error {
      display: none;
      padding: 40px; text-align: center; color: var(--text2);
      font-size: 1rem;
    }

    /* ═══════════════════════════════════════
       AI CHAT WIDGET
    ═══════════════════════════════════════ */
    #ai-widget {
      position: fixed;
      bottom: 28px; right: 28px;
      z-index: 1100;
      display: flex; flex-direction: column; align-items: flex-end;
      gap: 12px;
    }

    /* Nút mở/đóng */
    #ai-toggle {
      width: 58px; height: 58px; border-radius: 50%;
      border: 2.5px solid var(--cyan);
      background: var(--surface);
      cursor: pointer; padding: 0; overflow: visible;
      position: relative;
      box-shadow: 0 4px 20px rgba(0,206,209,.35), 0 2px 8px rgba(0,0,0,.2);
      transition: transform .2s, box-shadow .2s, border-color .2s;
      flex-shrink: 0;
    }
    #ai-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 28px rgba(0,206,209,.55), 0 0 0 4px rgba(0,206,209,.15);
    }
    #ai-toggle img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      border-radius: 50%;
    }
    /* Pulse căn đúng giữa icon */
    #ai-widget:not(.open) #ai-toggle::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 58px; height: 58px;
      border-radius: 50%;
      border: 2px solid var(--cyan);
      transform: translate(-50%, -50%) scale(1);
      animation: ai-pulse 2s ease-out infinite;
      pointer-events: none;
    }
    @keyframes ai-pulse {
      0%   { transform: translate(-50%, -50%) scale(1);   opacity: .8; }
      100% { transform: translate(-50%, -50%) scale(1.85); opacity: 0; }
    }

    /* Badge trạng thái online */
    #ai-toggle .ai-status {
      position: absolute; bottom: 3px; right: 3px;
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--lime);
      border: 2px solid var(--surface);
      box-shadow: 0 0 6px rgba(127,255,0,.6);
    }

    /* Wrapper toggle để position badge */
    #ai-toggle-wrap {
      position: relative; flex-shrink: 0;
    }

    /* Cửa sổ chat */
    #ai-chatbox {
      width: 360px;
      max-height: 520px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      display: flex; flex-direction: column;
      overflow: hidden;
      box-shadow: 0 12px 48px rgba(0,0,0,.22), 0 0 0 1px rgba(0,206,209,.1);
      transform-origin: bottom right;
      transition: transform .25s cubic-bezier(.34,1.4,.64,1), opacity .2s;
    }
    #ai-chatbox.hidden {
      transform: scale(.85) translateY(12px);
      opacity: 0;
      pointer-events: none;
    }

    /* Header chat */
    #ai-chat-header {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 16px;
      background: linear-gradient(135deg, rgba(0,206,209,.15), rgba(127,255,0,.08));
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #ai-chat-header img {
      width: 34px; height: 34px; border-radius: 50%;
      border: 2px solid var(--cyan);
      object-fit: cover; flex-shrink: 0;
    }
    .ai-header-info { flex: 1; min-width: 0; }
    .ai-name {
      font-size: .9rem; font-weight: 800;
      background: linear-gradient(90deg, var(--cyan), var(--lime));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .ai-status-text { font-size: .72rem; color: var(--lime); display: flex; align-items: center; gap: 4px; }
    .ai-status-text::before {
      content: ''; display: inline-block;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--lime);
      box-shadow: 0 0 5px var(--lime);
      flex-shrink: 0;
    }
    #ai-btn-close {
      background: none; border: none; cursor: pointer;
      color: var(--text2); font-size: 1.2rem; line-height: 1;
      padding: 4px; border-radius: 6px;
      transition: color .15s, background .15s;
    }
    #ai-btn-close:hover { color: var(--text); background: rgba(255,255,255,.1); }

    /* Messages area */
    #ai-messages {
      flex: 1; overflow-y: auto;
      padding: 14px 14px 8px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    #ai-messages::-webkit-scrollbar { width: 4px; }
    #ai-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .ai-msg {
      max-width: 85%; display: flex; flex-direction: column; gap: 3px;
      animation: msg-in .25s cubic-bezier(.34,1.3,.64,1);
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(8px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .ai-msg.bot  { align-self: flex-start; }
    .ai-msg.user { align-self: flex-end; }

    .ai-bubble {
      padding: 9px 13px;
      border-radius: 14px;
      font-size: .88rem; line-height: 1.65;
      word-break: break-word;
    }
    .ai-msg.bot  .ai-bubble {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    .ai-msg.user .ai-bubble {
      background: linear-gradient(135deg, var(--cyan), var(--teal));
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .ai-bubble pre {
      font-family: 'Courier New', monospace;
      font-size: .8rem; white-space: pre-wrap;
      margin-top: 6px;
      background: rgba(0,0,0,.15);
      padding: 8px 10px; border-radius: 8px;
    }

    /* Typing indicator */
    .ai-typing .ai-bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 12px 14px;
    }
    .ai-typing .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--cyan);
      animation: dot-bounce .9s ease-in-out infinite;
    }
    .ai-typing .dot:nth-child(2) { animation-delay: .15s; }
    .ai-typing .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes dot-bounce {
      0%,80%,100% { transform: translateY(0); opacity: .5; }
      40%          { transform: translateY(-6px); opacity: 1; }
    }

    /* Input area */
    #ai-input-area {
      display: flex; align-items: flex-end; gap: 8px;
      padding: 10px 12px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    #ai-input {
      flex: 1;
      resize: none; overflow: hidden;
      min-height: 38px; max-height: 100px;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--bg2);
      color: var(--text);
      font-size: .88rem; font-family: inherit;
      line-height: 1.5;
      transition: border-color .2s, box-shadow .2s;
    }
    #ai-input:focus {
      outline: none;
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,206,209,.12);
    }
    #ai-input::placeholder { color: var(--text2); }
    #ai-send {
      width: 38px; height: 38px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, var(--cyan), var(--teal));
      color: #fff; font-size: 1rem; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      box-shadow: 0 3px 10px rgba(0,206,209,.4);
    }
    #ai-send:hover:not(:disabled) {
      transform: scale(1.1);
      box-shadow: 0 5px 16px rgba(0,206,209,.55);
    }
    #ai-send:disabled { opacity: .4; cursor: default; transform: none; }

    /* Lỗi API key */
    #ai-api-warn {
      margin: 0 14px 10px;
      padding: 9px 12px;
      background: rgba(255,107,0,.1);
      border: 1px solid var(--orange);
      border-radius: 9px;
      font-size: .78rem; color: var(--orange);
      display: none;
    }

    @media (max-width: 480px) {
      #ai-widget { bottom: 16px; right: 16px; }
      #ai-chatbox { width: calc(100vw - 32px); }
    }
  </style>
</head>
<body>
  <!-- Đốm sáng nền CSS -->
  <div class="sh-orb" id="orb-a"></div>
  <div class="sh-orb" id="orb-b"></div>
  <div class="sh-orb" id="orb-c"></div>
  <div class="sh-orb" id="orb-d"></div>
  <div id="overlay"></div>

  <header>
    <button id="btn-menu" aria-label="Mở menu">
      <span></span><span></span><span></span>
    </button>
    <div id="logo">Study Helper</div>
    <div id="active-badge">Lý thuyết</div>
  </header>

  <aside id="sidebar" role="navigation" aria-label="Điều hướng chính">
    <div class="sidebar-header">📚 Menu</div>
    <nav id="sidebar-nav">
      <!-- [SỬA] data-src trỏ đúng đường dẫn file thực -->
      <a data-page="theory" data-src="../Theory/theory.html" class="active">
        <span class="nav-icon">📖</span> Lý thuyết
      </a>
      <a data-page="practice" data-src="../Practice/practice.html">
        <span class="nav-icon">✏️</span> Luyện tập
      </a>
      <div class="nav-divider"></div>
      <a data-page="instruct" data-src="../Instruct/instruct.html">
        <span class="nav-icon">❓</span> Hướng dẫn sử dụng
      </a>
    </nav>
    <div class="sidebar-footer">
      <button id="btn-theme" aria-label="Chuyển chế độ sáng/tối">
        <span id="theme-label">🌙 Chế độ tối</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </button>
    </div>
  </aside>

  <main id="main">
    <!-- [SỬA] Dùng iframe thay vì inject template -->
    <!-- Iframe load module thực: Theory, Practice, Instruct -->
    <iframe id="module-frame"
            src="../Theory/theory.html"
            title="Nội dung module"
            allow="same-origin">
    </iframe>
    <div id="frame-error">
      Không thể tải module. Hãy mở bằng local server (Live Server / http-server).
    </div>
  </main>

  <!-- ═══════════════════════════════════════
       AI CHAT WIDGET
  ═══════════════════════════════════════ -->
  <div id="ai-widget">
    <!-- Cửa sổ chat (ẩn mặc định) -->
    <div id="ai-chatbox" class="hidden">
      <div id="ai-chat-header">
        <img src="AI_icon.png" alt="AI" onerror="this.style.display='none'">
        <div class="ai-header-info">
          <div class="ai-name">✨ Trợ lý Study Helper</div>
          <div class="ai-status-text">Đang hoạt động</div>
        </div>
        <button id="ai-btn-close" title="Đóng">✕</button>
      </div>

      <div id="ai-messages"></div>

      <div id="ai-input-area">
        <textarea id="ai-input" rows="1" placeholder="Hỏi bất cứ điều gì về bài học..."></textarea>
        <button id="ai-send" title="Gửi">➤</button>
      </div>
    </div>

    <!-- Nút toggle -->
    <div id="ai-toggle-wrap">
      <button id="ai-toggle" title="Trợ lý AI">
        <img src="AI_icon.png" alt="AI" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><circle cx=%2220%22 cy=%2220%22 r=%2220%22 fill=%22%2300CED1%22/><text x=%2250%%25%22 y=%2255%%25%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22 font-size=%2222%22>🤖</text></svg>'">
      </button>
      <div class="ai-status"></div>
    </div>
  </div>

  <script>
    /* ============================================================
       home.js – Study Helper
       [SỬA CHÍNH] Chuyển từ inject template sang điều hướng iframe thực
    ============================================================ */
    (() => {
      'use strict';

      const body      = document.body;
      const btnMenu   = document.getElementById('btn-menu');
      const overlay   = document.getElementById('overlay');
      const navLinks  = document.querySelectorAll('#sidebar-nav a[data-page]');
      const frame     = document.getElementById('module-frame');
      const btnTheme  = document.getElementById('btn-theme');
      const themeLabel= document.getElementById('theme-label');
      const badge     = document.getElementById('active-badge');

      /* Metadata mỗi trang */
      const PAGE_META = {
        theory  : { label: 'Lý thuyết',         src: '../Theory/theory.html'    },
        practice: { label: 'Luyện tập',          src: '../Practice/practice.html'},
        instruct: { label: 'Hướng dẫn sử dụng', src: '../Instruct/instruct.html'}
      };

      /* ── SIDEBAR ── */
      function openSidebar()  { body.classList.add('sidebar-open'); }
      function closeSidebar() { body.classList.remove('sidebar-open'); }

      btnMenu.addEventListener('click', () => body.classList.toggle('sidebar-open'));
      overlay.addEventListener('click', closeSidebar);
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSidebar(); });

      /* ── NAVIGATE (iframe src swap, không reload trang chủ) ── */
      function loadPage(pageId, customUrl) {
        const meta = PAGE_META[pageId];
        if (!meta) return;

        frame.src = customUrl || meta.src;

        /* Active link */
        navLinks.forEach(a => a.classList.toggle('active', a.dataset.page === pageId));

        /* Badge */
        badge.textContent = meta.label;

        /* Lưu trạng thái */
        localStorage.setItem('sh-active-page', pageId);
        history.replaceState({ page: pageId }, '', `#${pageId}`);

        /* Ẩn orb khi vào game, hiện lại khi ra ngoài */
        const isGame = customUrl && customUrl.includes('game.html');
        document.querySelectorAll('.sh-orb').forEach(o => {
          o.style.opacity = isGame ? '0' : '';
          o.style.transition = 'opacity 0.6s ease';
        });
        document.body.style.setProperty('--grid-vis', isGame ? '0' : '1');

        /* AI widget: chỉ hiện ở Lý thuyết */
        const aiWidget = document.getElementById('ai-widget');
        if (aiWidget) {
          aiWidget.style.display = pageId === 'theory' ? '' : 'none';
          if (pageId !== 'theory') {
            aiWidget.classList.remove('open');
            const chatbox = document.getElementById('ai-chatbox');
            if (chatbox) chatbox.classList.add('hidden');
          }
        }

        closeSidebar();
      }

      navLinks.forEach(a => {
        a.addEventListener('click', e => {
          e.preventDefault();
          loadPage(a.dataset.page);
        });
      });

      /* ── DARK / LIGHT ── */
      function applyTheme(dark) {
        body.classList.toggle('dark', dark);
        themeLabel.textContent = dark ? '☀️ Chế độ sáng' : '🌙 Chế độ tối';
        localStorage.setItem('sh-theme', dark ? 'dark' : 'light');
        /* [SỬA] Truyền theme vào iframe qua postMessage */
        try {
          frame.contentWindow.postMessage({ type: 'SH_THEME', dark }, '*');
        } catch(_) {}
      }

      btnTheme.addEventListener('click', () => applyTheme(!body.classList.contains('dark')));

      /* ── INIT ── */
      function init() {
        /* Theme */
        const saved = localStorage.getItem('sh-theme');
        if (saved === 'dark') applyTheme(true);
        else if (!saved) applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);

        /* [SỬA] Đọc page từ hash hoặc localStorage */
        const hash   = location.hash.replace('#', '');
        const stored = localStorage.getItem('sh-active-page');
        const start  = PAGE_META[hash] ? hash : (PAGE_META[stored] ? stored : 'theory');
        loadPage(start);
      }

      /* [SỬA] Lắng nghe message từ iframe để điều hướng từ bên trong module */
      window.addEventListener('message', e => {
        if (!e.data || e.data.type !== 'SH_NAVIGATE') return;
        const { page, url } = e.data;
        if (PAGE_META[page]) loadPage(page, url || null);
      });

      init();
    })();

    /* ═══════════════════════════════════════
       AI CHAT WIDGET
    ═══════════════════════════════════════ */
    (() => {
      'use strict';

      const widget   = document.getElementById('ai-widget');
      const chatbox  = document.getElementById('ai-chatbox');
      const toggle   = document.getElementById('ai-toggle');
      const btnClose = document.getElementById('ai-btn-close');
      const messages = document.getElementById('ai-messages');
      const input    = document.getElementById('ai-input');
      const sendBtn  = document.getElementById('ai-send');
      const apiWarn  = document.getElementById('ai-api-warn');

      let cfg        = null;   // home.json config
      let history    = [];     // conversation history gửi lên API
      let isOpen     = false;
      let isLoading  = false;
      let welcomed   = false;

      /* ── Load config từ home.json ── */
      async function loadConfig() {
        try {
          const res = await fetch('home.json');
          if (!res.ok) throw new Error();
          cfg = await res.json();
          /* Kiểm tra API key */
          if (!cfg.ai_api_key || cfg.ai_api_key === 'YOUR_ANTHROPIC_API_KEY_HERE') {
            apiWarn.style.display = 'block';
          }
          /* Cập nhật placeholder nếu có */
          if (cfg.ai_placeholder) input.placeholder = cfg.ai_placeholder;
        } catch(_) {
          apiWarn.style.display = 'block';
          apiWarn.textContent = '⚠️ Không tải được home.json. Kiểm tra file cấu hình.';
        }
      }

      /* ── Mở / Đóng chat ── */
      function openChat() {
        isOpen = true;
        widget.classList.add('open');
        chatbox.classList.remove('hidden');
        toggle.style.borderColor = 'var(--orange)';
        /* Hiện tin nhắn chào lần đầu */
        if (!welcomed && cfg?.ai_welcome) {
          welcomed = true;
          addMessage('bot', cfg.ai_welcome);
        }
        setTimeout(() => input.focus(), 250);
      }

      function closeChat() {
        isOpen = false;
        widget.classList.remove('open');
        chatbox.classList.add('hidden');
        toggle.style.borderColor = 'var(--cyan)';
      }

      toggle.addEventListener('click', () => isOpen ? closeChat() : openChat());
      btnClose.addEventListener('click', closeChat);

      /* ── Render message ── */
      function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = `ai-msg ${role}`;
        /* Chuyển newline thành <br> và escape HTML cơ bản */
        const safe = text
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/\n/g,'<br>');
        div.innerHTML = `<div class="ai-bubble">${safe}</div>`;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return div;
      }

      function addTyping() {
        const div = document.createElement('div');
        div.className = 'ai-msg bot ai-typing';
        div.innerHTML = `<div class="ai-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return div;
      }

      /* ── Gửi tin nhắn ── */
      async function sendMessage() {
        const text = input.value.trim();
        if (!text || isLoading) return;

        // Hiển thị tin nhắn người dùng
        addMessage("user", text);
        history.push({ role: "user", content: text });

        input.value = "";
        input.style.height = "";
        sendBtn.disabled = true;
        isLoading = true;

        const typingEl = addTyping();

        try {
          const res = await fetch(
            "https://study-helper-ai.tiendung28102010.workers.dev",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                message: text,
                system: cfg?.ai_system_prompt || 
                  "Bạn là trợ lý học tập cho học sinh THPT. Trả lời ngắn gọn, dễ hiểu bằng tiếng Việt."
              })
            }
          );

          const rawText = await res.text();
          let data;

          try {
            data = JSON.parse(rawText);
          } catch (e) {
            throw new Error(
              "Server trả về dữ liệu không hợp lệ:\n" + rawText
            );
          }

          typingEl.remove();

          if (!res.ok) {
            addMessage(
              "bot",
              `❌ Lỗi AI Server\n` +
              `Status: ${res.status}\n` +
              `Chi tiết: ${data?.detail || data?.error || "Không rõ"}`
            );
            history.pop();
            return;
          }

          const reply = data.reply || "(AI không trả về nội dung)";

          if (!reply) {
            addMessage("bot", "(AI không trả về nội dung)");
            history.pop();
            return;
          }

          addMessage("bot", reply);
          history.push({ role: "assistant", content: reply });

        } catch (err) {
          typingEl.remove();
          addMessage(
            "bot",
            `❌ Lỗi kết nối chi tiết:\n${err.message}`
          );
          history.pop();
        }

        sendBtn.disabled = false;
        isLoading = false;
        input.focus();
      }

      /* ── Gửi khi bấm nút hoặc Enter (không Shift) ── */
      sendBtn.addEventListener('click', sendMessage);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      /* ── Auto-resize textarea ── */
      input.addEventListener('input', () => {
        input.style.height = '';
        input.style.height = Math.min(input.scrollHeight, 100) + 'px';
        sendBtn.disabled = !input.value.trim();
      });

      /* ── Init ── */
      sendBtn.disabled = true;
      loadConfig();
    })();
  </script>
</body>
</html>
